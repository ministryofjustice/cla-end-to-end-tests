# GitHub Actions Workflow: Lint Checks
# ====================================
# Purpose: Validates code quality and style compliance on all pull requests
#
# Trigger: Executes on pull requests to any branch
#
# Jobs:
#   - lint (Validate):
#       Runner: ubuntu-latest
#       Permissions: Read access to repository contents
#
#       Steps:
#         1. Checkout repository code
#         2. Setup Python environment using version specified in behave/.python-version
#         3. Install pre-commit framework for managing git hooks
#         4. Run Black code formatter check on all files
#         5. Run Flake8 linter check on all files
#
# Tools Used:
#   - Black: Python code formatter (style compliance)
#   - Flake8: Python linter (code quality and style)
#   - pre-commit: Git hook framework for running checks

name: Lint
run-name: Lint checks

on:
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  lint:
    permissions:
      contents: read

    name: Validate
    runs-on: ["ubuntu-latest"]

    steps:
      - name: Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "behave/.python-version"

      - name: Requirements
        shell: bash
        working-directory: ./
        run: python -m pip install pre-commit

      - name: Black
        shell: bash
        working-directory: ./
        run: pre-commit run --all-files black

      - name: Flake8
        shell: bash
        working-directory: ./
        run: pre-commit run --all-files flake8
